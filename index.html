<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07111f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Spark Transportation</title>
<style>
:root{--bg:#07111f;--card:#102033;--line:#294056;--text:#fff;--muted:#a9b8c7;--gold:#ffb000;--green:#2ec4b6}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(#07111f,#0c1b2b);color:var(--text)}
.app{max-width:580px;margin:auto;min-height:100vh;padding:12px 14px 95px}.brand{display:flex;align-items:center;gap:10px;margin-bottom:14px}.logo{width:58px;height:58px;border-radius:14px}.muted{color:var(--muted)}.small{font-size:12px}
.card{background:#102033;border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}h1{font-size:20px;margin:0}h3{margin:0 0 12px}
label{display:block;font-size:13px;color:var(--muted);margin:11px 0 6px}input,select,textarea{width:100%;padding:13px;border-radius:12px;border:1px solid var(--line);background:#081522;color:#fff;font-size:16px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}button{width:100%;padding:13px;border:0;border-radius:13px;font-weight:800;font-size:15px}.primary{background:var(--gold);color:#2b1700}.secondary{background:#17304a;color:#fff}.green{background:var(--green);color:#042822}.danger{background:#52232a;color:#ffdce1}
.hidden{display:none!important}.entry{border:1px solid var(--line);border-radius:13px;padding:12px;margin-top:9px;background:#091522}.details{margin-top:10px;padding-top:8px;border-top:1px solid var(--line)}.activity-detail{padding:9px 0;border-bottom:1px solid var(--line)}.activity-detail:last-child{border-bottom:0}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(100%,580px);display:grid;grid-template-columns:repeat(4,1fr);background:#08131f;border-top:1px solid var(--line);padding:8px 5px calc(8px + env(safe-area-inset-bottom))}
.nav button{background:transparent;color:var(--muted);font-size:11px}.nav button.active{background:#3b290c;color:#ffd166}
section{display:none}section.active{display:block}.kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line)}
</style>
</head>
<body>
<div class="app">
<div class="brand"><img src="icon-192.png" class="logo"><div><h1>Spark Transportation</h1><div class="muted small">v0.6 • Date & Detailed History</div></div></div>

<section id="home" class="active">
<div class="card"><h3>Current Day</h3><div id="homeStatus" class="muted">No active day.</div><button class="primary" style="margin-top:12px" onclick="show('day')">Open Day</button></div>
<div class="card"><div class="kv"><span>Total completed days</span><b id="dayCount">0</b></div><div class="kv"><span>Total pay</span><b id="totalPay">$0.00</b></div></div>
</section>

<section id="day">
<div class="card">
<h3>Start / Edit Day</h3>
<div id="startBox">
<label>Date</label><input id="dayDate" type="date">
<label>Beginning mileage</label><input id="beginMileage" type="number">
<label>Start time</label><input id="startTime" type="time">
<button class="primary" style="margin-top:12px" onclick="startDay()">Start Day</button>
</div>

<div id="activeBox" class="hidden">
<label>Date</label><input id="editDayDate" type="date">
<div class="row"><div><label>Beginning mileage</label><input id="editBeginMileage" type="number"></div><div><label>Start time</label><input id="editStartTime" type="time"></div></div>

<hr>
<h3>Add Activity</h3>
<label>Activity</label>
<select id="activityType" onchange="updateActivityFields()">
<option value="">Select activity</option>
<option>Live Load</option><option>Live Unload</option><option>Wait Time</option>
<option>Meeting</option><option>Survey</option><option>Training</option>
<option>Hook</option><option>Stop</option><option>Arrive</option><option>Arrive Drop</option>
<option>Layover</option><option>Chain</option><option>Regional Pay</option>
</select>

<div id="timedFields" class="hidden">
<div class="row"><div><label>Start time</label><input id="activityStart" type="time"></div><div><label>Stop time</label><input id="activityStop" type="time"></div></div>
<label>Hourly rate</label><input id="activityHourlyRate" type="number" step="0.01">
</div>

<div id="flatFields" class="hidden">
<div class="row"><div><label>Quantity</label><input id="activityQty" type="number" min="1" value="1"></div><div><label>Rate each</label><input id="activityFlatRate" type="number" step="0.01"></div></div>
</div>

<div id="commonFields" class="hidden">
<label>Store / Vendor / Notes</label><input id="activityNote" placeholder="Optional">
<button class="secondary" style="margin-top:12px" onclick="addActivity()">Add Activity</button>
</div>

<div id="activityList"></div>

<hr>
<div class="row"><div><label>Ending mileage</label><input id="endMileage" type="number"></div><div><label>End time</label><input id="endTime" type="time"></div></div>
<label>PTO</label><select id="ptoType"><option value="none">None</option><option>Vacation</option><option>Sick</option><option>Safety</option></select>
<label>PTO hours</label><input id="ptoHours" type="number" step="0.25" value="0">
<button class="green" style="margin-top:12px" onclick="saveDay()">Save Day</button>
<button class="danger" style="margin-top:8px" onclick="cancelDay()">Cancel Day</button>
</div>
</div>
</section>

<section id="history"><div class="card"><h3>History</h3><div id="historyList" class="muted">No entries.</div></div></section>

<section id="setup">
<div class="card"><h3>Driver Rates</h3>
<label>Driver name</label><input id="driverName">
<label>Region</label><input id="regionName">
<label>Regular mileage rate</label><input id="mileageRate" type="number" step="0.001">
<label>Weekend mileage rate</label><input id="weekendRate" type="number" step="0.001">
<label>Live Load / hr</label><input id="liveLoadRate" type="number" step="0.01">
<label>Live Unload / hr</label><input id="liveUnloadRate" type="number" step="0.01">
<label>Wait Time / hr</label><input id="waitRate" type="number" step="0.01">
<label>Manual ADP</label><input id="manualAdp" type="number" step="0.01">
<label>Hook</label><input id="hookRate" type="number" step="0.01">
<label>Stop</label><input id="stopRate" type="number" step="0.01">
<label>Arrive</label><input id="arriveRate" type="number" step="0.01">
<label>Arrive Drop</label><input id="arriveDropRate" type="number" step="0.01">
<label>Layover</label><input id="layoverRate" type="number" step="0.01">
<label>Chain</label><input id="chainRate" type="number" step="0.01">
<label>Regional Pay</label><input id="regionalRate" type="number" step="0.01">
<button class="primary" style="margin-top:12px" onclick="saveSetup()">Save Setup</button>
</div>
</section>
</div>

<div class="nav">
<button class="active" data-page="home" onclick="show('home')">Home</button>
<button data-page="day" onclick="show('day')">Day</button>
<button data-page="history" onclick="show('history')">History</button>
<button data-page="setup" onclick="show('setup')">Setup</button>
</div>

<script>
const KEY='sparkTransportationV05';
const defaults={driverName:'',regionName:'',mileageRate:.679,weekendRate:.749,liveLoadRate:17,liveUnloadRate:17,waitRate:17,manualAdp:0,hookRate:10,stopRate:12.75,arriveRate:12.75,arriveDropRate:12.75,layoverRate:42,chainRate:60,regionalRate:6};
let state={setup:{...defaults},active:null,activities:[],entries:[]};
const $=id=>document.getElementById(id),num=v=>Number(v||0),money=v=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(num(v));

function show(id){document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===id));render()}
function save(){localStorage.setItem(KEY,JSON.stringify(state));render()}
function load(){const s=localStorage.getItem(KEY);if(s)try{state=JSON.parse(s)}catch(e){};state.setup={...defaults,...state.setup};Object.keys(state.setup).forEach(k=>{if($(k))$(k).value=state.setup[k]});dayDate.value=new Date().toISOString().slice(0,10);render()}
function decimalHours(a,b){if(!a||!b)return 0;const [ah,am]=a.split(':').map(Number),[bh,bm]=b.split(':').map(Number);let m=(bh*60+bm)-(ah*60+am);if(m<0)m+=1440;return Math.round((m/60)*100)/100}
function isTimed(t){return ['Live Load','Live Unload','Wait Time','Meeting','Survey','Training'].includes(t)}
function defaultRate(t){
 if(t==='Live Load')return num(state.setup.liveLoadRate)
 if(t==='Live Unload')return num(state.setup.liveUnloadRate)
 if(t==='Wait Time')return num(state.setup.waitRate)
 if(['Meeting','Survey','Training'].includes(t))return num(state.setup.manualAdp)/10
 return {'Hook':state.setup.hookRate,'Stop':state.setup.stopRate,'Arrive':state.setup.arriveRate,'Arrive Drop':state.setup.arriveDropRate,'Layover':state.setup.layoverRate,'Chain':state.setup.chainRate,'Regional Pay':state.setup.regionalRate}[t]||0
}
function updateActivityFields(){
 const t=activityType.value
 timedFields.classList.toggle('hidden',!isTimed(t))
 flatFields.classList.toggle('hidden',!t||isTimed(t))
 commonFields.classList.toggle('hidden',!t)
 if(!t)return
 if(isTimed(t))activityHourlyRate.value=defaultRate(t)
 else activityFlatRate.value=defaultRate(t)
}
function startDay(){
 if(!dayDate.value||!beginMileage.value||!startTime.value){alert('Enter the date, beginning mileage and start time.');return}
 state.active={date:dayDate.value,beginMileage:num(beginMileage.value),startTime:startTime.value}
 state.activities=[];save()
}
function addActivity(){
 const t=activityType.value;if(!t){alert('Select an activity.');return}
 if(isTimed(t)){
  if(!activityStart.value||!activityStop.value){alert('Enter activity start and stop times.');return}
  const h=decimalHours(activityStart.value,activityStop.value),r=num(activityHourlyRate.value)
  state.activities.push({type:t,kind:'timed',start:activityStart.value,stop:activityStop.value,hours:h,rate:r,note:activityNote.value,pay:h*r})
 }else{
  const q=Math.max(1,num(activityQty.value)),r=num(activityFlatRate.value)
  state.activities.push({type:t,kind:'flat',qty:q,rate:r,note:activityNote.value,pay:q*r})
 }
 activityType.value='';activityStart.value=activityStop.value=activityHourlyRate.value=activityFlatRate.value=activityNote.value='';activityQty.value=1;updateActivityFields();save()
}
function editActivity(i){
 const a=state.activities[i];activityType.value=a.type;updateActivityFields();activityNote.value=a.note||''
 if(a.kind==='timed'){activityStart.value=a.start;activityStop.value=a.stop;activityHourlyRate.value=a.rate}
 else{activityQty.value=a.qty;activityFlatRate.value=a.rate}
 state.activities.splice(i,1);save()
}
function removeActivity(i){state.activities.splice(i,1);save()}
function saveDay(){
 const date=editDayDate.value,bm=num(editBeginMileage.value),em=num(endMileage.value),st=editStartTime.value,et=endTime.value
 if(!date||!bm||!em||!st||!et){alert('Enter date, beginning and ending mileage, and start and end times.');return}
 if(em<bm){alert('Ending mileage cannot be lower.');return}
 const miles=em-bm,rate=(new Date(state.active.date+'T12:00:00').getDay()%6===0)?num(state.setup.weekendRate):num(state.setup.mileageRate)
 const mileagePay=miles*rate,activityPay=state.activities.reduce((s,a)=>s+a.pay,0),ptoPay=ptoType.value==='none'?0:num(ptoHours.value)*(num(state.setup.manualAdp)/10)
 state.entries.push({date,beginMileage:bm,endMileage:em,startTime:st,endTime:et,miles,mileagePay,activities:[...state.activities],activityPay,ptoType:ptoType.value,ptoHours:num(ptoHours.value),ptoPay,total:mileagePay+activityPay+ptoPay})
 state.active=null;state.activities=[];save();show('home')
}
function cancelDay(){state.active=null;state.activities=[];save()}
function saveSetup(){Object.keys(defaults).forEach(k=>state.setup[k]=['driverName','regionName'].includes(k)?$(k).value:num($(k).value));save();show('home')}
function toggleHistoryDetails(i){const el=$('historyDetails'+i);if(el)el.classList.toggle('hidden')}
function render(){
 startBox.classList.toggle('hidden',!!state.active);activeBox.classList.toggle('hidden',!state.active)
 if(state.active){if(!editDayDate.value)editDayDate.value=state.active.date;if(!editBeginMileage.value)editBeginMileage.value=state.active.beginMileage;if(!editStartTime.value)editStartTime.value=state.active.startTime}
 homeStatus.textContent=state.active?`Day in progress: ${state.active.startTime}, mileage ${state.active.beginMileage}`:'No active day.'
 dayCount.textContent=state.entries.length;totalPay.textContent=money(state.entries.reduce((s,e)=>s+e.total,0))
 activityList.innerHTML=state.activities.length?state.activities.map((a,i)=>`<div class="entry"><b>${a.type}</b><div class="muted small">${a.kind==='timed'?`${a.start}–${a.stop} • ${a.hours.toFixed(2)} hrs • ${money(a.rate)}/hr`:`Qty ${a.qty} • ${money(a.rate)} each`}</div>${a.note?`<div>${a.note}</div>`:''}<div><b>${money(a.pay)}</b></div><div class="actions"><button class="secondary" onclick="editActivity(${i})">Edit</button><button class="danger" onclick="removeActivity(${i})">Remove</button></div></div>`).join(''):'<div class="muted small">No activities added.</div>'
 historyList.innerHTML=state.entries.length?[...state.entries].reverse().map((e,revIndex)=>{const i=state.entries.length-1-revIndex;return `<div class="entry"><b>${e.date}</b><div class="muted small">${e.beginMileage} → ${e.endMileage} • ${e.startTime}–${e.endTime}</div><div class="kv"><span>Activities (${e.activities.length})</span><b>${money(e.activityPay)}</b></div><div class="kv"><span>Total</span><b>${money(e.total)}</b></div><button class="secondary" style="margin-top:9px" onclick="toggleHistoryDetails(${i})">View Activities</button><div id="historyDetails${i}" class="details hidden">${e.activities.length?e.activities.map(a=>`<div class="activity-detail"><b>${a.type}</b><div class="muted small">${a.kind==='timed'?`${a.start}–${a.stop} • ${a.hours.toFixed(2)} decimal hours • ${money(a.rate)}/hr`:`Quantity ${a.qty} • ${money(a.rate)} each`}</div>${a.note?`<div class="small">${a.note}</div>`:''}<div><b>${money(a.pay)}</b></div></div>`).join(''):'<div class="muted small">No activities recorded.</div>'}</div></div>`}).join(''):'No entries.'
}
load()
</script>
</body>
</html>
